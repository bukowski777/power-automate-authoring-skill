name: Validate skill

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Intentionally avoid actions/checkout. This public repo does not need Git history in CI.
        run: |
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz" -o source.tar.gz
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run repository checks
        run: bash scripts/validate-skill.sh

      - name: Run install smoke test
        run: bash scripts/test-install.sh

      - name: Build package smoke test
        run: bash scripts/package-skill.sh --version ci --output-dir tmp/ci-dist
