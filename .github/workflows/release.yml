name: Release package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build release archive
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Intentionally avoid actions/checkout. This public repo does not need Git history in CI.
        run: |
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz" -o source.tar.gz
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate skill
        run: bash scripts/validate-skill.sh

      - name: Package skill
        run: bash scripts/package-skill.sh --version "${GITHUB_REF_NAME}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/*.sha256 --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/*.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Power Automate Authoring Skill release ${GITHUB_REF_NAME}"
          fi
