name: Release package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build release archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate skill
        run: bash scripts/validate-skill.sh

      - name: Package skill
        run: bash scripts/package-skill.sh --version "${GITHUB_REF_NAME}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/*.sha256 --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/*.sha256 \
              --title "${GITHUB_REF_NAME}" \
              --notes "Power Automate Authoring Skill release ${GITHUB_REF_NAME}"
          fi
